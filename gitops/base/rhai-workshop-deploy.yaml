---
apiVersion: v1
kind: Namespace
metadata:
  name: rhai-workshop-plugin
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: rhai-workshop-plugin
    app.kubernetes.io/part-of: rhai-workshop-plugin
  name: workshop-config
  namespace: rhai-workshop-plugin
data:
  showTabs: "true"
  tutorialUrls: |
    [
      {"name": "Voice Agents", "url": "https://eformat.github.io/voice-agents/voice-agents/index.html"},
      {"name": "Rainforest", "url": "https://eformat.github.io/rainforest-docs"}
    ]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
---
# ClusterRole for init container: enable console plugin + patch IngressController
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhai-workshop-cluster-setup
rules:
- apiGroups: ["console.openshift.io"]
  resources: ["consolelinks"]
  verbs: ["get", "list"]
- apiGroups: ["operator.openshift.io"]
  resources: ["consoles"]
  verbs: ["get", "patch"]
- apiGroups: ["operator.openshift.io"]
  resources: ["ingresscontrollers"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhai-workshop-cluster-setup
subjects:
- kind: ServiceAccount
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
roleRef:
  kind: ClusterRole
  name: rhai-workshop-cluster-setup
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for Go backend auth middleware: TokenReview + SubjectAccessReview
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhai-workshop-auth
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhai-workshop-auth
subjects:
- kind: ServiceAccount
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
roleRef:
  kind: ClusterRole
  name: rhai-workshop-auth
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for Go backend config discovery: read ConsoleLinks + ConfigMaps
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhai-workshop-config-reader
rules:
- apiGroups: ["console.openshift.io"]
  resources: ["consolelinks"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhai-workshop-config-reader
subjects:
- kind: ServiceAccount
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
roleRef:
  kind: ClusterRole
  name: rhai-workshop-config-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rhai-workshop-plugin
    app.kubernetes.io/component: rhai-workshop-plugin
    app.kubernetes.io/instance: rhai-workshop-plugin
    app.kubernetes.io/part-of: rhai-workshop-plugin
    app.openshift.io/runtime-namespace: rhai-workshop-plugin
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhai-workshop-plugin
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rhai-workshop-plugin
    spec:
      serviceAccountName: rhai-workshop-plugin
      initContainers:
      - name: cluster-setup
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          # Enable the console plugin if not already enabled
          PLUGIN=rhai-workshop-plugin
          if kubectl get consoles.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' 2>/dev/null | grep -q "$PLUGIN"; then
            echo "Plugin $PLUGIN already enabled"
          else
            kubectl patch consoles.operator.openshift.io cluster --type=json \
              -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
            echo "Plugin $PLUGIN enabled"
          fi

          # Patch IngressController to allow iframe embedding
          echo "Patching IngressController to remove X-Frame-Options and Content-Security-Policy"
          kubectl patch ingresscontroller/default -n openshift-ingress-operator --type=merge -p "{
            \"spec\": {
              \"httpHeaders\": {
                \"actions\": {
                  \"response\": [
                    {
                      \"name\": \"X-Frame-Options\",
                      \"action\": { \"type\": \"Delete\" }
                    },
                    {
                      \"name\": \"Content-Security-Policy\",
                      \"action\": { \"type\": \"Delete\" }
                    }
                  ]
                }
              }
            }
          }"
      containers:
      - image: quay.io/eformat/rhai-workshop-plugin:latest
        imagePullPolicy: Always
        name: rhai-workshop-plugin
        ports:
        - containerPort: 9443
          protocol: TCP
        env:
        - name: PORT
          value: "9443"
        - name: PLUGIN_DIST_DIR
          value: /app/dist
        - name: TLS_CERT_FILE
          value: /var/serving-cert/tls.crt
        - name: TLS_KEY_FILE
          value: /var/serving-cert/tls.key
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /api/health
            port: 9443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 9443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /var/serving-cert
          name: plugin-serving-cert
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
      - name: plugin-serving-cert
        secret:
          defaultMode: 420
          secretName: plugin-serving-cert
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: plugin-serving-cert
  labels:
    app: rhai-workshop-plugin
    app.kubernetes.io/component: rhai-workshop-plugin
    app.kubernetes.io/instance: rhai-workshop-plugin
    app.kubernetes.io/part-of: rhai-workshop-plugin
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
spec:
  ports:
  - name: 9443-tcp
    port: 9443
    protocol: TCP
    targetPort: 9443
  selector:
    app: rhai-workshop-plugin
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: rhai-workshop-plugin
spec:
  displayName: RHAI Workshop Plugin
  backend:
    type: Service
    service:
      basePath: /
      name: rhai-workshop-plugin
      namespace: rhai-workshop-plugin
      port: 9443
  proxy:
    - alias: backend
      authorization: UserToken
      endpoint:
        type: Service
        service:
          name: rhai-workshop-plugin
          namespace: rhai-workshop-plugin
          port: 9443
