---
# ClusterRole for showroom watcher (merged into main Go backend):
# watch namespaces + read user ConfigMaps
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhai-workshop-showroom-watcher
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhai-workshop-showroom-watcher
subjects:
- kind: ServiceAccount
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
roleRef:
  kind: ClusterRole
  name: rhai-workshop-showroom-watcher
  apiGroup: rbac.authorization.k8s.io
